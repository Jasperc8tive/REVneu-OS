name: CI
on:
  push:
    branches:
      - main
      - develop
      - 'chore/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ── TypeScript: Lint ────────────────────────────────────────────────────────
  lint-typescript:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Python: Lint ────────────────────────────────────────────────────────────
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff==0.9.1

      - name: Run Ruff linter
        run: ruff check apps/agents/

  # ── Prisma: Schema Validation ───────────────────────────────────────────────
  validate-schema:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        working-directory: packages/database
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://revneu:revneu@localhost:5432/revneu_db

  # ── NestJS: Unit Tests ──────────────────────────────────────────────────────
  test-api:
    name: Test API (NestJS)
    runs-on: ubuntu-latest
    needs: [lint-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        working-directory: apps/api
        run: npm test

  # ── Python: Unit Tests ──────────────────────────────────────────────────────
  test-agents:
    name: Test Agents (Python)
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: apps/agents
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: apps/agents
        run: pytest tests/ -v

  # ── Build Check ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-api, test-agents, validate-schema]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build
        env:
          # Dummy env vars needed for Next.js build
          NEXT_PUBLIC_API_URL: http://localhost:4000
          DATABASE_URL: postgresql://revneu:revneu@localhost:5432/revneu_db

  lighthouse-web:
    name: Lighthouse (Web)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-lighthouse-secret

      - name: Run Lighthouse CI
        working-directory: apps/web
        run: npm run lhci
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-lighthouse-secret
